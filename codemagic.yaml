workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: com.dressly.dressly

    scripts:
      - name: Install dependencies
        script: |
          cd mobile_flutter
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd mobile_flutter/ios
          pod install

      - name: Build IPA
        script: |
          cd mobile_flutter
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - mobile_flutter/build/ios/ipa/*.ipa