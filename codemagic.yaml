workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get dependencies
        script: |
          cd mobile_flutter
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd mobile_flutter/ios
          pod install

      - name: Build IPA
        script: |
          cd mobile_flutter
          flutter build ipa --release --no-codesign

    artifacts:
      - mobile_flutter/build/ios/ipa/*.ipa