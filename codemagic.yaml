workflows:
  flutter-ios-build:
    name: Flutter iOS Build
    max_build_duration: 60

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get dependencies
        script: |
          cd mobile_flutter && flutter pub get

      - name: Install CocoaPods
        script: |
          cd mobile_flutter/ios && pod install

      - name: Build iOS (no codesign)
        script: |
          cd mobile_flutter && flutter build ios --release --no-codesign --config-only
          cd mobile_flutter/ios && xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" -sdk iphoneos -destination generic/platform=iOS build

    artifacts:
      - mobile_flutter/build/ios/iphoneos/*.app