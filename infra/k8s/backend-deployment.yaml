# ══════════════════════════════════════════════════════════════
# Dressly — Backend Deployment + Service + HPA
# ══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dressly-backend
  namespace: dressly
  labels:
    app: dressly-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dressly-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dressly-backend
    spec:
      serviceAccountName: dressly-backend
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/dressly/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: dressly-config
            - secretRef:
                name: dressly-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: dressly-backend

---
apiVersion: v1
kind: Service
metadata:
  name: dressly-backend
  namespace: dressly
spec:
  type: ClusterIP
  selector:
    app: dressly-backend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dressly-backend-hpa
  namespace: dressly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dressly-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dressly-backend
  namespace: dressly
