name: dressly
description: Dressly — AI-Powered Fashion & Wardrobe Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1
  web_socket_channel: ^2.4.0

  # Storage
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.4

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Image
  image_picker: ^1.0.7

  # Utils
  intl: ^0.18.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
